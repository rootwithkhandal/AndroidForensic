[bumpversion]
commit = True
current_version = 4.0.0
files = androidforensic/__init__.py
tag = True
tag_name = {new_version}

[flake8]
ignore = E128,E501,E731,F401,F841,W291,W293
statistics = True

[coverage:run]
omit =
	androidforensic/web/*
	androidforensic/tui/*
	androidforensic/cli/*
	androidforensic/__init__.py
	androidforensic/__main__.py
