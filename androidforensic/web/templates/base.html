<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AndroidForensic Everywhere | Responsive Forensic Suite</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Top Navigation -->
  <nav class="navbar">
    <div class="brand">
      <span class="brand-icon">🛡️</span>
      <span>AndroidForensic Everywhere</span>
    </div>
    <div class="nav-controls">
      <div class="device-badge" id="device-status-badge">
        <div class="status-dot" id="device-status-dot"></div>
        <span id="device-status-text">Checking Device...</span>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <a href="{{ url_for('index') }}" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
        <i>📊</i><span>Dashboard</span>
      </a>
      <a href="{{ url_for('extract_page') }}" class="nav-link {% if active_page == 'extract' %}active{% endif %}">
        <i>⚡</i><span>Extraction</span>
      </a>
      <a href="{{ url_for('decoders_page') }}" class="nav-link {% if active_page == 'decoders' %}active{% endif %}">
        <i>🔍</i><span>Decoders</span>
      </a>
      <a href="{{ url_for('crack_page') }}" class="nav-link {% if active_page == 'crack' %}active{% endif %}">
        <i>🔓</i><span>Lockscreen</span>
      </a>
      <a href="{{ url_for('tools_page') }}" class="nav-link {% if active_page == 'tools' %}active{% endif %}">
        <i>🛠️</i><span>Tools</span>
      </a>
      <a href="{{ url_for('settings_page') }}" class="nav-link {% if active_page == 'settings' %}active{% endif %}">
        <i>⚙️</i><span>Settings</span>
      </a>
      <a href="{{ url_for('reports_page') }}" class="nav-link {% if active_page == 'reports' %}active{% endif %}">
        <i>📑</i><span>Reports</span>
      </a>
    </aside>

    <!-- Content Area -->
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Real-time Console Dock -->
  <footer class="console-dock">
    <div class="console-header">
      <span>🖥️ Live Forensic Execution Console</span>
      <span style="font-size: 0.75rem;">Server-Sent Events (SSE) Stream Active</span>
    </div>
    <div class="console-log" id="console-log-container">
      <div class="log-entry log-info">
        <span class="log-time">[System]</span>
        <span>Ready for acquisition, decoding, or password cracking tasks.</span>
      </div>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
