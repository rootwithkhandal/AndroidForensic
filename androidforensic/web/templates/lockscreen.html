{% extends "base.html" %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Lockscreen Password Cracking</h1>
  <p class="page-subtitle">Crack gesture patterns and PIN/passwords from extracted hashes and salts.</p>
</div>

<div class="grid-2">
  <!-- Pattern Cracking Card -->
  <div class="card">
    <div class="card-title"><i>🔣</i> Gesture Pattern Cracker</div>
    <form id="form-pattern-crack">
      <div class="form-group">
        <label class="form-label">SHA1 Pattern Hash Hex</label>
        <input type="text" class="form-control" id="pattern-hash-input" placeholder="e.g. c8c0b24a15dc8bbf..." required>
      </div>
      <button type="submit" class="btn btn-warning" style="width: 100%;">
        <span>⚡ Crack Pattern</span>
      </button>
    </form>
    <div id="pattern-result-box" style="display: none; margin-top: 1.5rem; padding: 1rem; background: rgba(0, 230, 118, 0.1); border: 1px solid var(--success-color); border-radius: 0.5rem;">
      <div style="color: var(--success-color); font-weight: 600; margin-bottom: 0.5rem;">Pattern Cracked!</div>
      <div style="font-size: 1.25rem; font-weight: 700;" id="pattern-result-text"></div>
    </div>
  </div>

  <!-- PIN Cracking Card -->
  <div class="card">
    <div class="card-title"><i>🔢</i> Numeric PIN Cracker</div>
    <form id="form-pin-crack">
      <div class="form-group">
        <label class="form-label">Password Salt (Integer)</label>
        <input type="number" class="form-control" id="pin-salt-input" placeholder="e.g. 123456789" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password Hash (Hex String)</label>
        <input type="text" class="form-control" id="pin-hash-input" placeholder="SHA1 / MD5 hash" required>
      </div>
      <div class="form-group">
        <label class="form-label">Max PIN Length</label>
        <input type="number" class="form-control" id="pin-len-input" value="8" min="4" max="10">
      </div>
      <div class="form-group" style="display: flex; align-items: center; gap: 0.75rem;">
        <input type="checkbox" id="pin-samsung-check" style="width: 18px; height: 18px;">
        <label for="pin-samsung-check" style="font-size: 0.95rem; cursor: pointer;">Use Samsung SHA1/PBKDF Algorithm</label>
      </div>
      <button type="submit" class="btn btn-warning" style="width: 100%;">
        <span>🚀 Start PIN Crack Job</span>
      </button>
    </form>
  </div>
</div>
{% endblock %}
